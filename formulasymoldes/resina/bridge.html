<!-- =====================================================
LAUNCH ENGINE ROOT
===================================================== -->

<div id="launch-engine">
  
  <div id="offer-sticky"></div> <!-- botón fijo de oferta -->
  
  <div id="launch-header"></div> <!-- Título principal -->
  
  <div id="offer-deadline"></div> <!-- Subtítulo del contador de cierre oferta -->
  
  <div id="contador-wrapper" class="countdown-container">
  
    <div class="countdown">
  
      <div class="unit">
        <span class="number" id="days">00</span>
        <span class="label">DÍAS</span>
      </div>
  
      <div class="colon">:</div>
  
      <div class="unit">
        <span class="number" id="hours">00</span>
        <span class="label">HORAS</span>
      </div>
  
      <div class="colon">:</div>
  
      <div class="unit">
        <span class="number" id="minutes">00</span>
        <span class="label">MINUTOS</span>
      </div>
  
      <div class="colon">:</div>
  
      <div class="unit">
        <span class="number" id="seconds">00</span>
        <span class="label">SEGUNDOS</span>
      </div>
  
    </div>
  
  </div>
  
  <div id="launch-proxima"></div>
  
  <div id="launch-info"></div>
  
  <hr>
  
  <h2 id="launch-calendar-title"></h2>
  
  <div id="launch-clases"></div>

</div>
