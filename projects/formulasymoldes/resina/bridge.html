<!-- =====================================================
LAUNCH ENGINE ROOT
===================================================== -->
<div id="launch-engine">

  <div id="launch-logo">
    <img src="https://res.cloudinary.com/die02mh0y/image/upload/c_scale,w_105/f_auto,q_auto:eco/r_25/v1775772746/formulasymoldeslogo_xmvd5d.png"
      width="60"
      height="60"
      alt="Fórmulas y Moldes logo"
      fetchpriority="high"
      decoding="async"
    >
  </div>

  <div id="estado-cerrado"></div>
  
  <div id="offer-sticky" class="dynamic-block"></div> <!-- botón fijo de oferta -->
  
  <h1 id="launch-header" class="dynamic-block"></h1> <!-- Título principal -->
  
  <div id="offer-deadline" class="dynamic-block"></div> <!-- Subtítulo del contador de cierre oferta -->
  
  <div id="contador-wrapper" class="countdown-container dynamic-block">
  
    <div class="countdown">
  
      <div class="unit">
        <span class="number" id="days">00</span>
        <span class="label">DÍAS</span>
      </div>
  
      <div class="colon">:</div>
  
      <div class="unit">
        <span class="number" id="hours">00</span>
        <span class="label">HORAS</span>
      </div>
  
      <div class="colon">:</div>
  
      <div class="unit">
        <span class="number" id="minutes">00</span>
        <span class="label">MINUTOS</span>
      </div>
  
      <div class="colon">:</div>
  
      <div class="unit">
        <span class="number" id="seconds">00</span>
        <span class="label">SEGUNDOS</span>
      </div>
  
    </div>
  
  </div>
  
  <div id="launch-proxima-label" class="dynamic-block"></div>

  <div id="launch-proxima" class="dynamic-block"></div>

  <div id="launch-cta-final" class="dynamic-block"></div>

  <div id="launch-info" class="dynamic-block"></div>
  
  <hr class="dynamic-block" id="divider">
  
  <h2 id="launch-calendar-title"  class="dynamic-block"></h2>
  
  <div id="launch-clases" class="dynamic-block"></div>

  <div id="footer-slot" style="min-height:20px"></div>

</div>
