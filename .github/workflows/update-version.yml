name: Update version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.json'

permissions:
  contents: write

jobs:
  update-version:
    if: "!contains(github.event.head_commit.message, 'update version')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest commit
        run: |
          echo "{ \"commit\": \"$(git rev-parse HEAD)\" }" > version.json

      - name: Commit version.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "update version" || echo "no changes"

      - name: Push changes
        run: git push
